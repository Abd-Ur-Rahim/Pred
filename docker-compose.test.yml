services:
  postgres-test:
    image: postgres:18
    container_name: pred-notifications-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications_test"]
      interval: 1s
      timeout: 3s
      retries: 30
